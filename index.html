<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Mahasiswa - Spotify Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #121212; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: #1c1c1c; border-bottom: 1px solid #383838; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 20px; }
    .logo svg { width: 32px; height: 32px; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: #a6a6a6; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 16px; }
    .form-card { width: 100%; max-width: 420px; background: #1c1c1c; border-radius: 12px; padding: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
    h1 { text-align: center; font-size: 24px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #a6a6a6; font-size: 14px; margin-bottom: 32px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    label { font-size: 14px; font-weight: 600; }
    input, select { width: 100%; padding: 12px 16px; border-radius: 6px; border: 1px solid #383838; background: #282828; color: #fff; font-size: 14px; font-family: 'Montserrat', sans-serif; outline: none; transition: all 0.2s; }
    input::placeholder { color: #a6a6a6; }
    input:focus, select:focus { border-color: transparent; box-shadow: 0 0 0 2px #1DB954; }
    select { appearance: none; cursor: pointer; }
    button[type="submit"] { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 50px; background: #1DB954; color: #000; font-weight: 700; font-size: 14px; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
    button[type="submit"]:hover { transform: scale(1.02); filter: brightness(1.1); }
    button[type="submit"]:active { transform: scale(0.98); }
    footer { border-top: 1px solid #383838; padding: 24px; text-align: center; color: #a6a6a6; font-size: 12px; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="#1DB954"><circle cx="12" cy="12" r="12"/></svg>
      <span>Spotify</span>
    </div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </nav>
  <main>
    <div class="form-card">
      <h1>Form Input Mahasiswa</h1>
      <p class="subtitle">Silakan isi data diri Anda</p>
      <form>
        <div class="field"><label>Nama:</label><input type="text" placeholder="Masukkan nama" required></div>
        <div class="field"><label>NPM:</label><input type="text" placeholder="Masukkan NPM" required></div>
        <div class="field"><label>Kelas:</label><select required><option value="" disabled selected>Pilih Kelas</option><option>A</option><option>B</option></select></div>
        <div class="field"><label>Tanggal:</label><input type="date" required></div>
        <div class="field"><label>Waktu:</label><input type="time" required></div>
        <button type="submit">Submit</button>
      </form>
    </div>
  </main>
  <footer>&copy; 2026 Form Mahasiswa. All rights reserved.</footer>
</body>
</html>
